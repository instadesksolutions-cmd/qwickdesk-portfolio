<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | QwickDesk Solutions</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .page-header { text-align: center; padding: 60px 20px 40px; }
        .contact-wrap { display: grid; grid-template-columns: 1fr 1.2fr; gap: 50px; max-width: 1100px; margin: 0 auto 100px; padding: 0 5%; }
        
        .info-card { padding: 40px; background: linear-gradient(135deg, var(--primary), var(--dark)); color: white; border-radius: 24px; }
        .info-card h2 { color: white; margin-bottom: 20px; }
        .contact-method { display: flex; gap: 15px; margin-bottom: 30px; align-items: center; }
        .contact-method i { font-size: 20px; color: var(--primary); background: white; padding: 15px; border-radius: 50%; }
        .contact-method h4 { color: white; margin-bottom: 5px; }
        .contact-method a { color: #d1d5db; font-size: 0.95rem; }
        .contact-method a:hover { color: var(--secondary); text-decoration: underline; }

        .form-card { padding: 40px; }
        .input-group { margin-bottom: 20px; }
        .input-group input, .input-group select, .input-group textarea { width: 100%; padding: 15px; border: 1px solid var(--glass-border); border-radius: 10px; background: rgba(255,255,255,0.5); outline: none; transition: 0.3s; font-family: inherit; }
        .input-group input:focus, .input-group textarea:focus { background: white; border-color: var(--primary-light); }
        
        [data-fs-success] { display: none; background: #d1fae5; color: #065f46; padding: 15px; border-radius: 10px; margin-bottom: 20px; font-weight: bold; text-align: center; }
        [data-fs-error]:not([data-fs-error=""]) { display: block; color: red; font-size: 13px; margin-top: 5px; }
        [data-fs-error=""] { display: none; }

        @media (max-width: 991px) {
            .contact-wrap { grid-template-columns: 1fr; gap: 30px; }
            .info-card, .form-card { padding: 30px 20px; }
        }
    </style>
</head>
<body>
    <div class="bg-blobs"><div class="blob blob-1"></div></div>

    <nav class="navbar">
        <div class="logo">QwickDesk<span>.</span></div>
        <div class="nav-menu">
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="services.html">Services</a></li>
                <li><a href="pricing.html">Pricing</a></li>
                <li><a href="contact.html" class="active">Contact</a></li>
            </ul>
            <div class="nav-actions">
                <a href="pricing.html" class="btn btn-primary">Packages</a>
                <div class="hamburger"><i class="fas fa-bars"></i></div>
            </div>
        </div>
    </nav>

    <header class="page-header reveal">
        <h1 class="text-gradient">Get In Touch</h1>
    </header>

    <section class="contact-wrap">
        <!-- Details (No long email text) -->
        <div class="info-card reveal">
            <h2>Contact Details</h2>
            <p style="color: #ccc; margin-bottom: 30px;">Reach out to us directly.</p>
            
            <div class="contact-method">
                <i class="fas fa-phone-alt"></i>
                <div>
                    <h4>Call Us</h4>
                    <a href="tel:+917249828812">+91 7249828812</a>
                </div>
            </div>
            <div class="contact-method">
                <i class="fab fa-whatsapp"></i>
                <div>
                    <h4>WhatsApp</h4>
                    <a href="https://wa.me/917249828812">+91 7249828812</a>
                </div>
            </div>
            <div class="contact-method">
                <i class="fas fa-envelope"></i>
                <div>
                    <h4>Email Us</h4>
                    <!-- E-mail address is hidden behind this short text to fix overflow -->
                    <a href="mailto:qwickdesksolutions@outlook.com">Click here to send email</a>
                </div>
            </div>
        </div>

        <!-- Formspree Form -->
        <div class="glass-card form-card reveal delay-1">
            <div data-fs-success>Thank you! Your request is received.</div>
            <form id="qwickdesk-form">
                <div class="input-group">
                    <input type="text" name="name" placeholder="Your Name or Business Name" data-fs-field required>
                    <span data-fs-error="name"></span>
                </div>
                <div class="input-group">
                    <input type="tel" name="phone" placeholder="WhatsApp Number" data-fs-field required>
                    <span data-fs-error="phone"></span>
                </div>
                <div class="input-group">
                    <select name="plan" data-fs-field required>
                        <option value="" disabled selected>-- Select a Plan --</option>
                        <option value="Starter">Starter Plan (₹699)</option>
                        <option value="Growth">Growth Plan (₹999)</option>
                        <option value="Pro">Pro Plan (₹1,499)</option>
                        <option value="Dynamic">Dynamic Website</option>
                    </select>
                </div>
                <div class="input-group">
                    <textarea name="message" rows="4" placeholder="Your requirements..." data-fs-field required></textarea>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;" data-fs-submit-btn>Submit Details</button>
            </form>
        </div>
    </section>

    <script>
      window.formspree = window.formspree || function () { (formspree.q = formspree.q || []).push(arguments); };
      /* User's original Endpoint ID */
      formspree('initForm', { formElement: '#qwickdesk-form', formId: 'xaqrevgl' });
    </script>
    <script src="https://unpkg.com/@formspree/ajax@1" defer></script>
    <script src="script.js"></script>
</body>
</html>
